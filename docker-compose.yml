# ontoMeta 一键部署：PostgreSQL + API + Frontend
# 用法（仓库根目录）：
#   docker compose up --build -d
# 访问：
#   前端 http://localhost:5180
#   API  http://localhost:8000  （/docs、/health）
# 可选 Redis：取消下方 redis 服务注释（当前草稿队列为进程内，不依赖 Redis）

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ontometa
      POSTGRES_PASSWORD: ontometa
      POSTGRES_DB: ontometa
    volumes:
      - ontometa_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ontometa -d ontometa"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://ontometa:ontometa@postgres:5432/ontometa
      ONTOMETA_ADMIN_TOKEN: ${ONTOMETA_ADMIN_TOKEN:-dev-admin-token-change-me}
      DEBUG: ${DEBUG:-false}
      USE_MOCK_DATAHUB: ${USE_MOCK_DATAHUB:-true}
      USE_MOCK_LLM: ${USE_MOCK_LLM:-true}
      DATAHUB_GMS_URL: ${DATAHUB_GMS_URL:-http://host.docker.internal:8080}
      DATAHUB_FRONTEND_URL: ${DATAHUB_FRONTEND_URL:-http://localhost:9002}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_KEY_HASH_PEPPER: ${API_KEY_HASH_PEPPER:-}
      MAX_CONCURRENT_DRAFT_GENERATIONS: ${MAX_CONCURRENT_DRAFT_GENERATIONS:-2}
      EXTERNAL_API_RATE_LIMIT_PER_MINUTE: ${EXTERNAL_API_RATE_LIMIT_PER_MINUTE:-60}
      CORS_ORIGINS: '["http://localhost:5180","http://127.0.0.1:5180"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5180:80"
    depends_on:
      - api

  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"

volumes:
  ontometa_pg:
